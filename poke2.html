    <!-- Main Content -
    <div class="container">
        <!-- Search Section --
        <section id="pokemon" class="search-section">
            <div class="section-header">
                <h2>🔍 Encontre seu Pokémon</h2>
                <p>Busque por nome, número ou tipo</p>
            </div>
            
            <div class="search-controls">
                <input type="text" class="search-input" id="searchInput" placeholder="Digite o nome do Pokémon (Pikachu, Charizard...)">
                <select id="typeFilter" class="filter-select">
                    <option value="">Todos os Tipos</option>
                    <option value="fire">🔥 Fogo</option>
                    <option value="water">💧 Água</option>
                    <option value="grass">🌿 Grama</option>
                    <option value="electric">⚡ Elétrico</option>
                </select>
                <button class="btn btn-outline" id="clearFilters">Limpar Filtros</button>
            </div>

            <div class="loading" id="loading">
                <div class="pokeball"></div>
                Carregando Pokémon...
            </div>

            <div class="pokemon-grid" id="pokemonGrid"></div>
            <div class="load-more" id="loadMoreBtn">Carregar Mais Pokémon</div>
        </section>

            <div class="types-grid" id="typesGrid"></div>
