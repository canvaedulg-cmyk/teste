<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Pokeloja</title>
    <!-- Vincula o arquivo CSS -->
    <link rel="stylesheet" href="index2.css">
</head>

<body>
    <div class="formulario-compra">

        <!-- TELA 1: FORMULÁRIO -->
        <div id="caixaFormulario" class="tela-interna">
            <div class="campo-grupo">
                <label for="nome-cliente">Nome do Treinador:</label>
                <input type="text" id="nome-cliente" placeholder="Ex: Ash Ketchum">
            </div>
            <div class="campo-grupo">
                <label for="idade-cliente">Idade:</label>
                <input type="number" id="idade-cliente" placeholder="Ex: 10" min="0">
            </div>
            <div class="campo-grupo">
                <label for="cpf-cliente">CPF:</label>
                <input type="text" id="cpf-cliente" placeholder="000.000.000-00" maxlength="14">
            </div>
            <div class="campo-grupo">
                <label for="cep-cliente">CEP da Região:</label>
                <input type="text" id="cep-cliente" placeholder="00000-000" maxlength="9">
            </div>
            <div class="campo-grupo">
                <label for="pagamento-cliente">Forma de Pagamento:</label>
                <select id="pagamento-cliente">
                    <option value="" disabled selected>Escolha sua carteira</option>
                    <option value="credito">Cartão de Crédito</option>
                    <option value="debito">Cartão de Débito</option>
                    <option value="pix">Pix (Instantâneo)</option>
                </select>
            </div>
            <div class="botao-container">
                <button type="button" id="btnFinalizar" class="btn-finalizar">
                    <span class="imgcarrinho"></span>Finalizar Compra
                </button>
            </div>
        </div>

        <!-- TELA 2: MENSAGEM DE SUCESSO (Inicia escondida) -->
        <div id="caixaSucesso" class="tela-sucesso escondido">
            <div class="pokebola-animada"></div>
            <h1 class="titulo-sucesso">Compra Finalizada! com sucesso ✅</h1>
            <p class="mensagem-texto">
                Tudo pronto, Treinador <span id="nomeTreinador"></span>!<br><br>
                Seu Pokémon chegará na sua região entre:
                <span class="prazo-destaque">10 e 20 dias</span>
            </p>

            <a href="26.html">
                <button type="button" id="btnFinalizar" class="btn-finalizar">
                    <span class="imgcarrinho"></span>
                    <span>voltar</span>
                </button>
            </a>

        </div>

    </div>

    <!-- Vincula o arquivo JavaScript -->
    <script src="index.js"></script>
</body>

</html>
